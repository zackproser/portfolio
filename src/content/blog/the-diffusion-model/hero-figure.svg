<svg viewBox="0 0 940 320" width="100%" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor">
  <!-- forward process arrow (top): x0 -> xT, adds noise -->
  <g stroke="currentColor" stroke-width="2" opacity="0.85">
    <path d="M60 46 H872"/>
    <path d="M872 46 l-14 -6 v12 z" fill="currentColor" stroke="none"/>
  </g>
  <!-- reverse process arrow (bottom): xT -> x0, denoises -->
  <g stroke="currentColor" stroke-width="2" opacity="0.85">
    <path d="M880 252 H68"/>
  </g>
  <!-- reverse arrowhead lands on the clean x0 (accent payoff) -->
  <path d="M68 252 l14 -6 v12 z" fill="var(--og-accent)" stroke="none"/>

  <!-- the five image tiles: x0 (clean) -> xT (pure noise) -->
