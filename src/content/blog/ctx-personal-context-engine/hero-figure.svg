<svg viewBox="0 0 940 300" width="100%" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor">
  <!-- fan-in lines: sources -> shared table -->
  <g stroke="currentColor" stroke-width="1.1" stroke-dasharray="5 5" opacity="0.55">
    <path d="M176 55 L392 150"/>
    <path d="M176 118 L392 150"/>
    <path d="M176 182 L392 150"/>
    <path d="M176 245 L392 150"/>
    <!-- fan-out lines: shared table -> readers -->
    <path d="M548 150 L764 52"/>
    <path d="M548 150 L764 117"/>
    <path d="M548 150 L764 183"/>
    <path d="M548 150 L764 248"/>
  </g>
  <!-- source nodes (writers) -->
  <g stroke="currentColor" stroke-width="2">
    <rect x="26" y="34" width="150" height="42"/>
    <rect x="26" y="97" width="150" height="42"/>
    <rect x="26" y="161" width="150" height="42"/>
    <rect x="26" y="224" width="150" height="42"/>
  </g>
  <!-- reader nodes (any provider) -->
  <g stroke="currentColor" stroke-width="2">
    <rect x="764" y="31" width="150" height="42"/>
    <rect x="764" y="96" width="150" height="42"/>
    <rect x="764" y="162" width="150" height="42"/>
    <rect x="764" y="227" width="150" height="42"/>
  </g>
  <!-- central shared items table -->
  <g stroke="currentColor" stroke-width="2.5">
    <rect x="392" y="102" width="156" height="96"/>
  </g>
  <!-- accent: the shared core hub (fan-in + fan-out anchors) -->
  <g fill="#f39c12" stroke="none">
    <circle cx="392" cy="150" r="6"/>
    <circle cx="548" cy="150" r="6"/>
    <rect x="464" y="120" width="12" height="12"/>
  </g>
  <!-- node labels -->
  <g fill="currentColor" stroke="none" style="font:600 18px 'JetBrains Mono',monospace">
    <text x="101" y="61" text-anchor="middle">Obsidian</text>
    <text x="101" y="124" text-anchor="middle">Linear</text>
    <text x="101" y="188" text-anchor="middle">cal.com</text>
    <text x="101" y="251" text-anchor="middle">chat</text>
    <text x="839" y="58" text-anchor="middle">Claude Code</text>
    <text x="839" y="123" text-anchor="middle">browser</text>
    <text x="839" y="189" text-anchor="middle">iPhone</text>
    <text x="839" y="254" text-anchor="middle">eve bots</text>
  </g>
  <!-- central label -->
  <g fill="currentColor" stroke="none" style="font:700 20px 'JetBrains Mono',monospace">
    <text x="470" y="164" text-anchor="middle">items</text>
  </g>
  <g fill="currentColor" stroke="none" opacity="0.7" style="font:500 15px 'JetBrains Mono',monospace">
    <text x="470" y="186" text-anchor="middle">TABLE</text>
  </g>
</svg>
