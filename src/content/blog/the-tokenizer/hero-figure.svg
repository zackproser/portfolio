<svg viewBox="0 0 940 300" width="100%" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor">
  <!-- pipeline stage boxes -->
  <g stroke="currentColor" stroke-width="1.5">
    <rect x="25" y="95" width="165" height="78"/>
    <rect x="232" y="95" width="185" height="78"/>
    <rect x="459" y="95" width="165" height="78"/>
    <rect x="666" y="95" width="249" height="78"/>
  </g>
  <!-- subword token chips -->
  <g stroke="currentColor" stroke-width="1.2" opacity="0.85">
    <rect x="248" y="118" width="64" height="32"/>
    <rect x="326" y="118" width="76" height="32"/>
  </g>
  <!-- embedding vector cells -->
  <g stroke="currentColor" stroke-width="1.2" opacity="0.85">
    <rect x="692" y="120" width="168" height="28"/>
    <path d="M720 120 V148 M748 120 V148 M776 120 V148 M804 120 V148 M832 120 V148"/>
  </g>
  <!-- dashed stage connectors -->
  <g stroke="currentColor" stroke-width="1.2" stroke-dasharray="5 4" opacity="0.75">
